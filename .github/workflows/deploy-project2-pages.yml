name: Deploy Project 2 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'IS1113_Web_Dev/Projects/Project 2/IS1113_Project_Part_2/**'
      - '.github/workflows/deploy-project2-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Project 2 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'IS1113_Web_Dev/Projects/Project 2/IS1113_Project_Part_2'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
